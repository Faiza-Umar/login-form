<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="container">
        <div id="login-form">

         <form>
        <div id="sign-up-msg">
            <h1 id="sign-up">Sign Up</h1>
        </div>

            <div class="input-field" id="namefield">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Name" class="tags" >
                
            </div>

            <div class="input-field">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="email" class="tags">
            </div>

            <div class="input-field">
                <i class="fa-solid fa-key"></i>
                <input type="password" placeholder="Password" class="tags">
            </div>

           <p id="for-pass">Forgot password!<a id="anchor"  href="https://www.google.com/">Click here</a>
           </p>

        </form>

        <div id="btns">
            <button class="bttns" id="supbtn">Sign up</button>
            <button class="bttns disable" id="sinbtn">Sign in</button>
        </div>

        </div>
    </div>



    
    <script src="script.js"></script>
</body>
</html>
